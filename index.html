<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GADIS QS HQ – QAN Solution (M) BHD</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode"></script>
<script type="module" src="js/main.js"></script>
</head>
<body>

<header>
  <h1>GADIS QS HQ</h1>
  <h3>QAN Solution (M) BHD</h3>
  <p>Dashboard Sistem Pengesahan Gadis QS</p>
</header>

<section class="ringkasan">
  <h2>📊 Ringkasan Sistem</h2>
  <div class="cards">
    <div class="card hijau">SAH / TELAH DITEBUS<br><span id="countSah">0</span></div>
    <div class="card kuning">AKTIF / BELUM DITEBUS<br><span id="countAktif">0</span></div>
    <div class="card merah">TIDAK SAH<br><span id="countInvalid">0</span></div>
  </div>
</section>

<section class="statistik">
  <h2>📈 Statistik Harian</h2>
  <canvas id="chartStats"></canvas>
</section>

<section class="map">
  <h2>🇲🇾 Map Pemenang</h2>
  <div id="map" style="height:400px;"></div>
</section>

<section class="semak">
  <h2>Semakan Kod Siri 🔍</h2>
  <input type="text" id="kodInput" placeholder="Masukkan Kod Siri">
  <button onclick="semakKod()">Semak</button>
  <canvas id="qrCanvas"></canvas>
  <div id="result"></div>
  <video id="preview" autoplay playsinline style="display:none; width:100%; border-radius:10px;"></video>
</section>

<img src="assets/stamp-sah.png" id="stampSah" class="stamp"/>
<img src="assets/stamp-aktif.png" id="stampAktif" class="stamp"/>
<audio id="audioSah" src="assets/audio-sah.mp3"></audio>
<audio id="audioAktif" src="assets/audio-aktif.wav"></audio>

<button id="installBtn" style="display:none">Install App</button>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display='block';
});
document.getElementById('installBtn').addEventListener('click', ()=>{
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; });
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/gadisqs/service-worker.js')
  .then(() => console.log("Service Worker Registered"))
  .catch(err => console.log("SW Failed:", err));
}  
</script>

</body>
</html>
